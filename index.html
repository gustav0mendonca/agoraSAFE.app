<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self' data: blob:; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'none';"
    />
    <title>ÁgoraSAFE.app — Cofre Offline</title>
    <script src="./libs/tailwind.browser.min.js"></script>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body class="bg-neutral-950 text-neutral-100 min-h-screen">
    <main class="max-w-5xl mx-auto px-4 py-6 md:py-10">
      <header class="mb-6 md:mb-8">
        <div class="flex flex-wrap items-center gap-3">
          <h1 class="text-2xl md:text-4xl font-black tracking-tight text-agora-yellow">ÁgoraSAFE.app</h1>
          <span class="chip">100% Offline</span>
        </div>
        <p class="mt-3 text-sm md:text-base text-neutral-300">
          Gerador e recuperador multichain para iniciantes. Nunca compartilhe sua seed.
        </p>
      </header>

      <section class="panel mb-5">
        <div class="flex justify-between text-xs text-neutral-400 mb-2">
          <span id="progressLabel">Etapa 1 de 6</span>
          <span id="progressPct">16%</span>
        </div>
        <div class="h-2 bg-neutral-800 rounded-full overflow-hidden">
          <div id="progressBar" class="h-full bg-agora-yellow transition-all duration-500" style="width: 16%"></div>
        </div>
      </section>

      <section class="alert-danger mb-5">
        ⚠️ Nunca compartilhe sua seed, passphrase ou chave privada. Esta aplicação não salva dados por padrão.
      </section>

      <section id="wizard" class="space-y-4">
        <div class="step panel" data-step="1"></div>
        <div class="step panel hidden" data-step="2"></div>
        <div class="step panel hidden" data-step="3"></div>
        <div class="step panel hidden" data-step="4"></div>
        <div class="step panel hidden" data-step="5"></div>
        <div class="step panel hidden" data-step="6"></div>
      </section>

      <footer class="mt-6 flex flex-wrap gap-3 justify-between items-center">
        <div class="flex gap-3">
          <button id="btnPrev" class="btn-secondary">← Voltar</button>
          <button id="btnNext" class="btn-primary">Próximo →</button>
        </div>
        <button id="btnReset" class="btn-danger">Limpar tudo</button>
      </footer>

      <p id="status" class="text-sm mt-4 text-neutral-400"></p>
    </main>

    <script src="./libs/bip39.min.js"></script>
    <script src="./libs/bitcoinjs-lib.min.js"></script>
    <script src="./libs/liquidjs-lib.min.js"></script>
    <script src="./libs/ethers.umd.min.js"></script>
    <script src="./libs/tronweb.min.js"></script>
    <script src="./libs/ed25519-hd-key.umd.js"></script>
    <script src="./libs/solana-web3.iife.min.js"></script>
    <script src="./libs/qrcode.min.js"></script>

    <script src="./js/config.js"></script>
    <script src="./js/state.js"></script>
    <script src="./js/utils.js"></script>
    <script src="./js/derive.js"></script>
    <script src="./js/ui.js"></script>
    <script src="./js/app.js"></script>
  </body>
</html>
